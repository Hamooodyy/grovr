<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grovr — Save on groceries</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --green: oklch(0.52 0.15 148);
    --green-mid: oklch(0.62 0.13 148);
    --green-light: oklch(0.95 0.05 148);
    --green-xlight: oklch(0.98 0.02 148);
    --amber: oklch(0.72 0.14 72);
    --amber-light: oklch(0.97 0.05 72);
    --bg: #f6fdf8;
    --surface: #ffffff;
    --text: #0e1f14;
    --muted: #6a7c71;
    --border: #ddeee4;
    --shadow: 0 1px 3px rgba(0,30,15,0.06), 0 4px 12px rgba(0,30,15,0.04);
    --shadow-lg: 0 4px 24px rgba(0,30,15,0.12);
    --r: 12px;
    --r-lg: 20px;
  }
  html, body { height: 100%; font-family: 'DM Sans', sans-serif; background: #1a2e22; }
  #root { height: 100%; }

  input { font-family: 'DM Sans', sans-serif; }
  button { font-family: 'DM Sans', sans-serif; }
  input[type=range] { width: 100%; cursor: pointer; }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%       { opacity: 0.6; transform: scale(0.85); }
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  /* Tweaks panel */
  #tweaks-panel {
    position: fixed; bottom: 90px; right: 16px; z-index: 999;
    background: white; border-radius: 16px; padding: 16px;
    width: 240px; box-shadow: 0 8px 32px rgba(0,20,10,0.18);
    border: 1px solid var(--border);
    animation: slideUp 0.2s ease;
  }
  @media (min-width: 768px) {
    #tweaks-panel { bottom: 24px; right: 24px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="grovr-screens.jsx"></script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

function useWindowWidth() {
  const [w, setW] = useState(window.innerWidth);
  useEffect(() => {
    const fn = () => setW(window.innerWidth);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return w;
}

// ── Mock data ──────────────────────────────────────────────────
const STORES = [
  { id:1, name:'FreshMart',    dist:0.4, x:48, y:42, delivery:'30–45 min', open:true },
  { id:2, name:'GreenLeaf',   dist:0.8, x:66, y:55, delivery:'40–55 min', open:true },
  { id:3, name:'Metro Grocer',dist:1.2, x:32, y:61, delivery:'35–50 min', open:true },
  { id:4, name:'Value Foods', dist:1.6, x:73, y:29, delivery:'45–60 min', open:true },
  { id:5, name:'Organic Hub', dist:2.1, x:20, y:27, delivery:'50–65 min', open:false },
];

const CATALOG = [
  { id:1,  name:'Whole Milk',      unit:'1 gal',  cat:'dairy',    prices:{1:3.49,2:3.99,3:2.89,4:2.69,5:4.29} },
  { id:2,  name:'Large Eggs',      unit:'12 ct',  cat:'dairy',    prices:{1:4.29,2:4.79,3:3.89,4:3.49,5:5.99} },
  { id:3,  name:'Sourdough Bread', unit:'1 loaf', cat:'bakery',   prices:{1:4.99,2:5.49,3:3.99,4:3.79,5:6.49} },
  { id:4,  name:'Chicken Breast',  unit:'2 lbs',  cat:'meat',     prices:{1:8.99,2:10.49,3:7.89,4:6.99,5:12.99} },
  { id:5,  name:'Bananas',         unit:'1 bunch',cat:'produce',  prices:{1:1.49,2:1.79,3:1.29,4:1.19,5:1.99} },
  { id:6,  name:'Penne Pasta',     unit:'16 oz',  cat:'pantry',   prices:{1:2.49,2:2.99,3:1.99,4:1.79,5:3.29} },
  { id:7,  name:'Tomato Sauce',    unit:'24 oz',  cat:'pantry',   prices:{1:3.29,2:3.79,3:2.79,4:2.49,5:4.49} },
  { id:8,  name:'Baby Spinach',    unit:'5 oz',   cat:'produce',  prices:{1:3.99,2:4.79,3:3.49,4:3.29,5:5.49} },
  { id:9,  name:'Greek Yogurt',    unit:'32 oz',  cat:'dairy',    prices:{1:5.49,2:6.29,3:4.99,4:4.49,5:7.29} },
  { id:10, name:'Orange Juice',    unit:'52 oz',  cat:'beverage', prices:{1:4.99,2:5.49,3:4.29,4:3.99,5:6.29} },
  { id:11, name:'Cheddar Cheese',  unit:'16 oz',  cat:'dairy',    prices:{1:5.99,2:6.79,3:5.49,4:4.99,5:7.99} },
  { id:12, name:'Roma Tomatoes',   unit:'4 ct',   cat:'produce',  prices:{1:2.29,2:2.79,3:1.99,4:1.89,5:3.49} },
];

const DEFAULT_ITEMS = [1,2,3,4,5,6,7,8].map(id => ({
  ...CATALOG.find(c=>c.id===id), qty: 1
}));

// Nav config
const NAV = [
  { id:'map',      label:'Stores',   icon: (active) => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="10" r="3" stroke="currentColor" strokeWidth="2"/>
      <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7Z"
        stroke="currentColor" strokeWidth="2" fill={active ? 'currentColor' : 'none'} fillOpacity="0.12"/>
    </svg>
  )},
  { id:'list',     label:'My List',  icon: (active) => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2" stroke="currentColor" strokeWidth="2"/>
      <rect x="9" y="3" width="6" height="4" rx="1" stroke="currentColor" strokeWidth="2"/>
      <path d="M9 12h6M9 16h4" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
    </svg>
  )},
  { id:'compare',  label:'Compare',  icon: (active) => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M18 20V10M12 20V4M6 20v-6" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
    </svg>
  )},
  { id:'checkout', label:'Checkout', icon: (active) => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" stroke="currentColor" strokeWidth="2"/>
      <line x1="3" y1="6" x2="21" y2="6" stroke="currentColor" strokeWidth="2"/>
      <path d="M16 10a4 4 0 01-8 0" stroke="currentColor" strokeWidth="2"/>
    </svg>
  )},
  { id:'track',    label:'Track',    icon: (active) => (
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="9" stroke="currentColor" strokeWidth="2"/>
      <path d="M12 7v5l3 3" stroke="currentColor" strokeWidth="2" strokeLinecap="round"/>
    </svg>
  )},
];

// Screen titles
const TITLES = {
  map: 'Nearby Stores', list: 'Shopping List',
  compare: 'Price Compare', checkout: 'Checkout', track: 'Order Tracking'
};

// ── Tweaks defaults ───────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "compareVariant": "summary",
  "accentColor": "green",
  "showSavingsBadge": true
}/*EDITMODE-END*/;

// ── Main App ──────────────────────────────────────────────────
function App() {
  const [screen, setScreen] = useState(() => localStorage.getItem('grovr-screen') || 'map');
  const [radius, setRadius] = useState(2);
  const [selectedStore, setSelectedStore] = useState(null);
  const [items, setItems] = useState(DEFAULT_ITEMS);
  const [winnerStore, setWinnerStore] = useState(STORES[3]); // Value Foods
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const isDesktop = useWindowWidth() >= 900;

  // Persist screen
  useEffect(() => { localStorage.setItem('grovr-screen', screen); }, [screen]);

  // Tweaks messaging
  useEffect(() => {
    const handler = (e) => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const setTweak = (key, val) => {
    const next = { ...tweaks, [key]: val };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  };

  const navigate = (s) => setScreen(s);

  const screenProps = {
    stores: STORES, catalog: CATALOG, items, setItems,
    radius, setRadius, selectedStore, setSelectedStore,
    compareVariant: tweaks.compareVariant,
    store: winnerStore, setWinnerStore,
    onNavigate: navigate, tweaks, isDesktop,
  };

  const Logo = () => (
    <div style={{display:'flex',alignItems:'center',gap:10}}>
      <div style={{width:36,height:36,borderRadius:11,background:'var(--green)',
        display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
          <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" fill="rgba(255,255,255,0.25)" stroke="white" strokeWidth="1.8"/>
          <path d="M3 6h18" stroke="white" strokeWidth="1.8"/>
          <path d="M16 10a4 4 0 01-8 0" stroke="white" strokeWidth="1.8" strokeLinecap="round"/>
        </svg>
      </div>
      <span style={{fontFamily:'Syne',fontWeight:800,fontSize:22,letterSpacing:'-0.02em',
        color: isDesktop ? 'white' : 'var(--text)'}}>Grovr</span>
    </div>
  );

  return (
    <div style={{display:'flex',height:'100%',background: isDesktop ? '#0e1f14' : 'var(--bg)'}}>

      {/* ── Desktop sidebar ── */}
      {isDesktop && (
        <aside style={{width:220,background:'#0e1f14',display:'flex',flexDirection:'column',
          padding:'28px 14px',flexShrink:0}}>
          <div style={{marginBottom:36,paddingLeft:6}}><Logo/></div>
          <nav style={{flex:1}}>
            {NAV.map(({ id, label, icon }) => {
              const active = screen === id;
              return (
                <button key={id} onClick={() => navigate(id)}
                  style={{display:'flex',alignItems:'center',gap:12,width:'100%',
                    padding:'11px 14px',borderRadius:12,border:'none',cursor:'pointer',
                    fontFamily:'inherit',fontSize:14,fontWeight: active ? 600 : 400,
                    textAlign:'left',marginBottom:2,transition:'all 0.15s',
                    background: active ? 'rgba(255,255,255,0.1)' : 'transparent',
                    color: active ? 'white' : 'rgba(255,255,255,0.45)'}}>
                  {icon(active)}
                  {label}
                </button>
              );
            })}
          </nav>
          {items.length > 0 && (
            <div style={{background:'rgba(255,255,255,0.07)',borderRadius:12,padding:'12px 14px',marginBottom:16}}>
              <div style={{fontSize:11,color:'rgba(255,255,255,0.4)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:6}}>Your list</div>
              <div style={{fontFamily:'Syne',fontWeight:800,fontSize:20,color:'white'}}>{items.length} items</div>
              <div style={{fontSize:12,color:'rgba(255,255,255,0.4)',marginTop:2}}>
                Est. from ${items.reduce((s,i)=>s+Math.min(...Object.values(i.prices))*i.qty,0).toFixed(2)}
              </div>
            </div>
          )}
          <div style={{fontSize:11,color:'rgba(255,255,255,0.25)',lineHeight:1.6,paddingLeft:6}}>
            Saving you money on<br/>groceries, with none<br/>of the hassle.
          </div>
        </aside>
      )}

      {/* ── Main content ── */}
      <div style={{
        flex:1, display:'flex', flexDirection:'column',
        background:'var(--bg)', overflow:'hidden',
        ...(isDesktop ? {} : {maxWidth:430, margin:'0 auto', width:'100%'}),
        ...(isDesktop ? {borderRadius:0} : {}),
      }}>
        {/* Header */}
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          padding: isDesktop ? '16px 28px' : '14px 18px 12px',
          background:'white', borderBottom:'1px solid var(--border)', flexShrink:0}}>
          {!isDesktop && <Logo/>}
          {isDesktop && (
            <div style={{fontFamily:'Syne',fontWeight:700,fontSize:18,color:'var(--text)'}}>
              {TITLES[screen]}
            </div>
          )}
          {!isDesktop && (
            <div style={{fontSize:13,fontWeight:500,color:'var(--muted)'}}>{TITLES[screen]}</div>
          )}
          {items.length > 0 && screen !== 'list' && (
            <div style={{display:'flex',alignItems:'center',gap:4,background:'var(--green-light)',
              borderRadius:99,padding:'4px 10px',cursor:'pointer'}}
              onClick={() => navigate('list')}>
              <span style={{fontWeight:700,fontSize:12,color:'var(--green)'}}>{items.length}</span>
              <span style={{fontSize:11,color:'var(--green)'}}>items</span>
            </div>
          )}
          {isDesktop && items.length === 0 && <div/>}
        </div>

        {/* Screen content */}
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column'}}>
          {screen === 'map'      && <MapScreen      {...screenProps}/>}
          {screen === 'list'     && <ListScreen     {...screenProps}/>}
          {screen === 'compare'  && <CompareScreen  {...screenProps}/>}
          {screen === 'checkout' && <CheckoutScreen {...screenProps}/>}
          {screen === 'track'    && <TrackScreen    {...screenProps}/>}
        </div>

        {/* Bottom nav — mobile only */}
        {!isDesktop && (
          <div style={{display:'flex',background:'white',borderTop:'1px solid var(--border)',flexShrink:0}}>
            {NAV.map(({ id, label, icon }) => {
              const active = screen === id;
              return (
                <button key={id} onClick={() => navigate(id)}
                  style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',
                    gap:3,padding:'10px 4px 12px',border:'none',cursor:'pointer',
                    background:'none', color: active ? 'var(--green)' : 'var(--muted)',
                    transition:'color 0.15s'}}>
                  {icon(active)}
                  <span style={{fontSize:10,fontWeight: active ? 700 : 500,letterSpacing:'0.02em'}}>{label}</span>
                </button>
              );
            })}
          </div>
        )}
      </div>

      {/* ── Tweaks panel ── */}
      {tweaksOpen && (
        <div id="tweaks-panel">
          <div style={{fontWeight:700,fontSize:14,marginBottom:14,color:'var(--text)',
            display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            Tweaks
            <button onClick={() => setTweaksOpen(false)}
              style={{background:'none',border:'none',cursor:'pointer',fontSize:18,color:'var(--muted)'}}>×</button>
          </div>

          {/* Compare variant */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',
              letterSpacing:'0.06em',marginBottom:8}}>Price Compare Layout</div>
            {[
              { val:'summary', label:'Summary list' },
              { val:'bars',    label:'Bar chart' },
              { val:'badges',  label:'Grid badges' },
            ].map(({ val, label }) => (
              <label key={val} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,cursor:'pointer'}}>
                <input type="radio" name="cv" checked={tweaks.compareVariant===val}
                  onChange={() => { setTweak('compareVariant', val); navigate('compare'); }}
                  style={{accentColor:'var(--green)'}}/>
                <span style={{fontSize:13}}>{label}</span>
              </label>
            ))}
          </div>

          {/* Savings badge */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',
              letterSpacing:'0.06em',marginBottom:8}}>Savings Badge</div>
            <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer'}}>
              <input type="checkbox" checked={tweaks.showSavingsBadge}
                onChange={e => setTweak('showSavingsBadge', e.target.checked)}
                style={{accentColor:'var(--green)'}}/>
              <span style={{fontSize:13}}>Show on winner card</span>
            </label>
          </div>

          {/* Quick nav */}
          <div>
            <div style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',
              letterSpacing:'0.06em',marginBottom:8}}>Jump to screen</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
              {NAV.map(n => (
                <button key={n.id} onClick={() => navigate(n.id)}
                  style={{padding:'5px 10px',borderRadius:99,border:'1px solid var(--border)',
                    background: screen===n.id ? 'var(--green-light)' : 'var(--bg)',
                    color: screen===n.id ? 'var(--green)' : 'var(--muted)',
                    fontFamily:'inherit',fontSize:11,fontWeight:600,cursor:'pointer'}}>
                  {n.label}
                </button>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
